HTML
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瞑想ガイドアプリ - Meditation Guide</title>
    <style>
        :root {
            --primary-color: #4a7c59;
            --secondary-color: #68b0ab;
            --bg-color: #faf9f6;
            --text-color: #2f3e46;
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
        }
        .lang-btn {
            background: #e0e0e0;
            border: none;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .lang-btn.active {
            background: var(--primary-color);
            color: white;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        .subtitle {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .steps-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        .step-btn {
            background: #f0f4f1;
            border: 2px solid #e0eae2;
            padding: 12px 5px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .step-btn:hover {
            background: #e2ede5;
        }
        .step-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .timer-display {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            color: var(--text-color);
        }
        .settings {
            margin-bottom: 25px;
        }
        .settings label {
            font-size: 14px;
            margin-right: 10px;
        }
        .settings input {
            width: 60px;
            padding: 5px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            text-align: center;
        }
        .controls {
            margin-bottom: 20px;
        }
        .main-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(74,124,89,0.3);
            transition: all 0.3s;
            width: 80%;
        }
        .main-btn:hover {
            background: #3b6346;
            transform: translateY(-2px);
        }
        .main-btn:active {
            transform: translateY(0);
        }
        .guide-text {
            min-height: 60px;
            font-size: 16px;
            line-height: 1.6;
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switch">
        <button id="btn-ja" class="lang-btn active" onclick="changeLanguage('ja')">日本語</button>
        <button id="btn-en" class="lang-btn" onclick="changeLanguage('en')">English</button>
    </div>

    <h1 id="app-title">瞑想ガイド</h1>
    <p id="app-subtitle" class="subtitle">アジャン・トーン師の教えとともに</p>

    <div class="steps-container">
        <button class="step-btn active" onclick="selectStep(1)">第1段階</button>
        <button class="step-btn" onclick="selectStep(2)">第2段階</button>
        <button class="step-btn" onclick="selectStep(3)">第3段階</button>
        <button class="step-btn" onclick="selectStep(4)">第4段階</button>
        <button class="step-btn" onclick="selectStep(5)">第5段階</button>
        <button class="step-btn" onclick="selectStep(6)">第6段階</button>
    </div>

    <div class="settings">
        <label id="label-time" for="time-input">タイマー設定 (分):</label>
        <input type="number" id="time-input" value="15" min="1" max="120" onchange="updateTimerDisplay()">
    </div>

    <div id="timer" class="timer-display">15:00</div>

    <div class="controls">
        <button id="start-btn" class="main-btn" onclick="toggleTimer()">瞑想開始</button>
    </div>

    <div id="guide" class="guide-text">準備ができたら「瞑想開始」を押してください。</div>
</div>

<script>
    // 言語データ
    const i18n = {
        ja: {
            title: "瞑想ガイド",
            subtitle: "アジャン・トーン師の教えとともに",
            labelTime: "タイマー設定 (分):",
            start: "瞑想開始",
            pause: "一時停止",
            ready: "準備ができたら「瞑想開始」を押してください。",
            finish: "瞑想が終了しました。サードゥ、サードゥ、サードゥ。",
            steps: ["第1段階", "第2段階", "第3段階", "第4段階", "第5段階", "第6段階"],
            guides: {
                1: "第1段階：呼吸に意識を向けます。「膨らみ」「縮み」に気づいていきましょう。",
                2: "第2段階：手の動きへの気づきを高めます。一つ一つの動作を丁寧に追います。",
                3: "第3段階：歩行瞑想（経行）を始めます。足の上げ下げに集中します。",
                4: "第4段階：身体の感覚、心の動き、すべての生滅をただ観察します。",
                5: "第5段階：深い集中（サマーディ）とともに、純粋な気づきを維持します。",
                6: "第6段階：内なる静寂と智慧（パンニャー）の広がりに身をゆだねます。"
            }
        },
        en: {
            title: "Meditation Guide",
            subtitle: "With the teachings of Ajahn Tong",
            labelTime: "Set Timer (min):",
            start: "Start Meditation",
            pause: "Pause",
            ready: "Press 'Start' when you are ready.",
            finish: "Meditation finished. Sadhu, Sadhu, Sadhu.",
            steps: ["Step 1", "Step 2", "Step 3", "Step 4", "Step 5", "Step 6"],
            guides: {
                1: "Step 1: Focus on the breath. Observe the rising and falling of the abdomen.",
                2: "Step 2: Increase awareness of hand movements. Notice each motion gently.",
                3: "Step 3: Begin walking meditation. Focus on the lifting and placing of your feet.",
                4: "Step 4: Observe bodily sensations and mental states as they arise and pass away.",
                5: "Step 5: Maintain pure awareness with deep concentration (Samadhi).",
                6: "Step 6: Rest in inner silence and the expansion of wisdom (Pannya)."
            }
        }
    };

    let currentLang = 'ja';
    let currentStep = 1;
    let timerId = null;
    let timeLeft = 15 * 60; // 秒換算
    let isRunning = false;

    // 言語切り替え
    function changeLanguage(lang) {
        currentLang = lang;
        
        // ボタンの見た目更新
        document.getElementById('btn-ja').classList.toggle('active', lang === 'ja');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        
        // テキストの更新
        document.getElementById('app-title').innerText = i18n[lang].title;
        document.getElementById('app-subtitle').innerText = i18n[lang].subtitle;
        document.getElementById('label-time').innerText = i18n[lang].labelTime;
        
        const startBtn = document.getElementById('start-btn');
        if (isRunning) {
            startBtn.innerText = i18n[lang].pause;
        } else {
            startBtn.innerText = i18n[lang].start;
        }

        // 段階ボタンのテキスト更新
        const stepButtons = document.querySelectorAll('.step-btn');
        stepButtons.forEach((btn, index) => {
            btn.innerText = i18n[lang].steps[index];
        });

        // ガイドテキストの更新
        updateGuideText();
    }

    // 段階の選択
    function selectStep(step) {
        currentStep = step;
        
        // ボタンの見た目更新
        const stepButtons = document.querySelectorAll('.step-btn');
        stepButtons.forEach((btn, index) => {
            btn.classList.toggle('active', (index + 1) === step);
        });

        updateGuideText();
    }

    // ガイドテキストの表示更新
    function updateGuideText() {
        if (isRunning) {
            document.getElementById('guide').innerText = i18n[currentLang].guides[currentStep];
        } else {
            document.getElementById('guide').innerText = i18n[currentLang].ready;
        }
    }

    // タイマー時間の表示更新（入力欄が変わったとき）
    function updateTimerDisplay() {
        if (isRunning) return;
        const mins = parseInt(document.getElementById('time-input').value) || 15;
        timeLeft = mins * 60;
        formatTimer(timeLeft);
    }

    // タイマーの書式設定 (00:00)
    function formatTimer(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        document.getElementById('timer').innerText = 
            `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    // タイマーの開始・停止
    function toggleTimer() {
        const startBtn = document.getElementById('start-btn');
        
        if (isRunning) {
            // 一時停止
            clearInterval(timerId);
            isRunning = false;
            startBtn.innerText = i18n[currentLang].start;
        } else {
            // 開始
            if (timeLeft <= 0) updateTimerDisplay();
            isRunning = true;
            startBtn.innerText = i18n[currentLang].pause;
            updateGuideText();

            timerId = setInterval(() => {
                timeLeft--;
                formatTimer(timeLeft);

                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    isRunning = false;
                    startBtn.innerText = i18n[currentLang].start;
                    document.getElementById('guide').innerText = i18n[currentLang].finish;
                    
                    // ブラウザの標準アラート音（または音声再生の代わりに簡易通知）
                    alert(i18n[currentLang].finish);
                }
            }, 1000);
        }
    }

    // 初期化
    updateTimerDisplay();
</script>

</body>
</html>
